<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - برنامج المحاسبة</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .user-status {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.9em;
        }

        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }

        .status-approved {
            background-color: #d4edda;
            color: #155724;
        }

        .status-admin {
            background-color: #cce5ff;
            color: #004085;
        }

        .action-btn {
            padding: 5px 10px;
            margin: 0 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-approve {
            background-color: #28a745;
            color: white;
        }

        .btn-reject {
            background-color: #dc3545;
            color: white;
        }

        .filters {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <header class="admin-header">
            <div>
                <h1>🛡️ لوحة التحكم</h1>
                <p>إدارة المستخدمين والصلاحيات</p>
            </div>
            <button class="btn btn-secondary" id="backBtn">عودة للرئيسية</button>
        </header>

        <div class="filters">
            <button class="btn btn-primary" id="refreshBtn">تحديث القائمة</button>
        </div>

        <div class="table-container">
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>البريد الإلكتروني</th>
                        <th>تاريخ التسجيل</th>
                        <th>الحالة</th>
                        <th>الصلاحية</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="6" class="loading">جاري التحميل...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Script to check auth immediately -->
    <script>
        const token = localStorage.getItem('authToken');
        if (!token) window.location.href = '/';

        // Simple JWT decode to check role before loading heavy scripts
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            if (payload.role !== 'admin') {
                alert('غير مصرح لك بالوصول لهذه الصفحة');
                window.location.href = '/';
            }
        } catch (e) {
            window.location.href = '/';
        }
    </script>
    <script src="/js/api.js"></script>
    <script src="/js/admin.js"></script>
</body>

</html>
